name: Release Please

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to release-please config"
        required: false
        type: string
        default: "release-please-config.json"
      manifest-file:
        description: "Path to release-please manifest"
        required: false
        type: string
        default: ".release-please-manifest.json"
    outputs:
      release_created:
        description: "Whether a release was created (true/false)"
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: "The release tag name (e.g. 1.2.3)"
        value: ${{ jobs.release-please.outputs.tag_name }}

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    name: Generate Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
